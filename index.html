<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>NasHub</title>
<style>
@font-face{font-family:'SF Pro';src:local('SF Pro Display'),local('Helvetica Neue'),local('Segoe UI');font-weight:400 700;font-display:swap}
:root{--font:'SF Pro',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--font-mono:'SF Mono','JetBrains Mono',monospace}
[data-theme="dark"]{--bg:#000;--txt:#f5f5f7;--txt2:#a1a1a6;--txt3:#6d6d72;--fill:rgba(120,120,128,.18);--fill2:rgba(120,120,128,.28);--line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.14);--blue:#0a84ff;--blue2:rgba(10,132,255,.16);--shadow:0 2px 16px rgba(0,0,0,.5);--shadow2:0 8px 32px rgba(0,0,0,.6)}
[data-theme="light"]{--bg:#f5f5f7;--txt:#1d1d1f;--txt2:#6e6e73;--txt3:#aeaeb2;--fill:rgba(0,0,0,.04);--fill2:rgba(0,0,0,.08);--line:rgba(0,0,0,.06);--line2:rgba(0,0,0,.1);--blue:#0071e3;--blue2:rgba(0,113,227,.08);--shadow:0 2px 12px rgba(0,0,0,.04);--shadow2:0 8px 24px rgba(0,0,0,.06)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{-webkit-font-smoothing:antialiased;font-size:16px}
body{font-family:var(--font);background:var(--bg);color:var(--txt);min-height:100dvh;overflow-x:hidden;line-height:1.47;letter-spacing:-.022em}
a{text-decoration:none;color:inherit}
#bgImage{position:fixed;inset:0;z-index:-1;background-size:cover;background-position:center;opacity:.25;transition:opacity .5s ease;pointer-events:none}
[data-theme="light"] #bgImage{opacity:.12}
#bgOverlay{position:fixed;inset:0;z-index:-1;pointer-events:none;display:none;background:rgba(0,0,0,.55)}
[data-theme="light"] #bgOverlay{background:rgba(255,255,255,.55)}
.ambient{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5}
.ambient::before,.ambient::after{content:'';position:absolute;border-radius:50%;filter:blur(180px)}
.ambient::before{width:800px;height:800px;background:radial-gradient(circle,rgba(10,132,255,.06),transparent 70%);top:-400px;left:-200px}
.ambient::after{width:600px;height:600px;background:radial-gradient(circle,rgba(175,82,222,.04),transparent 70%);bottom:-300px;right:-150px}
[data-theme="light"] .ambient{opacity:.3}
.app{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:48px 32px 80px;min-height:100dvh}
@media(max-width:768px){.app{padding:20px 16px 80px}}

.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px}
.top-left{display:flex;align-items:center;gap:0;flex:1;min-width:0;overflow:hidden}
.top-bar .settings-wrap{position:relative;flex-shrink:0;margin-left:16px}
.settings-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:var(--fill);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s ease}
.settings-btn:hover{border-color:var(--line2);color:var(--txt);background:var(--fill2)}
.settings-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.top-bar .cat-list{display:flex;align-items:center;gap:5px;margin:0 12px;overflow-x:auto;scrollbar-width:none;flex:1;min-width:0}
.top-bar .cat-list::-webkit-scrollbar{display:none}
.cat-item{flex-shrink:0;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:440;color:var(--txt2);transition:all .15s ease;user-select:none;letter-spacing:-.01em;border:none;background:var(--fill);white-space:nowrap}
.cat-item:hover{color:var(--txt);background:var(--fill2)}
.cat-item.active{background:var(--blue);color:#fff;font-weight:500;box-shadow:0 2px 8px var(--blue2)}
.cat-item .cat-count{font-size:10px;opacity:.6;margin-left:4px}.cat-item.active .cat-count{opacity:.9}
.cat-add{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1px dashed var(--line2);background:transparent;color:var(--txt3);font-size:12px;cursor:pointer;transition:all .15s ease;font-family:var(--font);white-space:nowrap}
.cat-add:hover{border-color:var(--txt3);color:var(--txt2)}
@media(max-width:768px){.cat-item{padding:5px 12px;font-size:12px}.cat-add{padding:5px 10px;font-size:11px}}

.settings-card{position:absolute;top:44px;right:0;z-index:55;background:#1c1c1e;border:1px solid var(--line);border-radius:18px;padding:20px;width:310px;max-height:75vh;overflow-y:auto;box-shadow:var(--shadow2);display:none;animation:fadeIn 150ms ease;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
[data-theme="light"] .settings-card{background:#fff}
.settings-card.show{display:block}
.settings-card .sec{margin-bottom:16px}.settings-card .sec:last-child{margin-bottom:0}
.settings-card .sec-label{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;font-family:var(--font-mono);opacity:.7}
.settings-card .row{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
.settings-card .row span{font-size:13px;color:var(--txt);font-weight:440}
.settings-card .toggle{width:44px;height:26px;border-radius:13px;border:none;cursor:pointer;transition:all .2s ease;position:relative;background:var(--fill2)}
.settings-card .toggle.on{background:var(--blue)}
.settings-card .toggle::after{content:'';position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:#fff;transition:all .2s ease;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.settings-card .toggle.on::after{left:20px}
.settings-card .th-opts{display:flex;gap:5px}
.settings-card .th-opts button{flex:1;padding:7px 4px;border-radius:9px;border:1px solid var(--line);background:var(--fill);color:var(--txt2);font-size:12px;cursor:pointer;transition:all .15s ease;font-family:var(--font)}
.settings-card .th-opts button.active{border-color:var(--blue);background:var(--blue2);color:var(--blue)}
.settings-card .divider{height:1px;background:var(--line);margin:12px 0}
.settings-card .plist{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.settings-card .plist button{padding:5px 12px;border-radius:20px;border:1px solid var(--line);background:var(--fill);color:var(--txt2);font-size:12px;cursor:pointer;transition:all .15s ease;font-family:var(--font);white-space:nowrap}
.settings-card .plist button.active{border-color:var(--blue);background:var(--blue2);color:var(--blue)}
.settings-card .plist .add{border-style:dashed;border-color:var(--line2);color:var(--txt3);font-size:16px;padding:3px 10px}
.ac-popover{position:fixed;z-index:60;background:#1c1c1e;border:1px solid var(--line);border-radius:12px;padding:4px;min-width:120px;box-shadow:var(--shadow2);animation:fadeIn 120ms ease}
[data-theme="light"] .ac-popover{background:#fff}
.ac-popover button{display:block;width:100%;padding:9px 14px;border:none;border-radius:8px;background:transparent;color:var(--txt);font-size:13px;text-align:left;cursor:pointer;transition:all .1s ease;font-family:var(--font)}
.ac-popover button:hover{background:var(--fill)}
.ac-popover button.danger{color:#ff453a}.ac-popover button.danger:hover{background:rgba(255,69,58,.08)}
.settings-card .link{display:block;width:100%;padding:7px;text-align:center;font-size:12px;color:var(--txt3);cursor:pointer;border-radius:8px;transition:all .15s ease;background:transparent;border:none;font-family:var(--font)}
.settings-card .link:hover{background:var(--fill);color:var(--txt2)}
.settings-card input[type=text],.settings-card input[type=search],.settings-card input[type=password]{width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--line);background:var(--fill);color:var(--txt);font-size:13px;outline:none;font-family:var(--font)}
.settings-card input[type=range]{-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:linear-gradient(to right,transparent,var(--card-color,#0a84ff));outline:none;cursor:pointer}
.settings-card input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--card-color,#0a84ff);cursor:pointer;border:2px solid #1c1c1e;box-shadow:var(--shadow)}
.settings-card input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--card-color,#0a84ff);cursor:pointer;border:2px solid #1c1c1e}

.search-wrap{max-width:640px;margin:0 auto 48px;position:relative}
.search-box{display:flex;align-items:center;border-radius:20px;background:var(--fill);border:1.5px solid var(--line);transition:all .3s ease;overflow:hidden}
.search-box:focus-within{border-color:var(--blue);box-shadow:0 0 0 4px var(--blue2)}
.engine-btn{display:flex;align-items:center;justify-content:center;padding:0 8px 0 16px;cursor:pointer;flex-shrink:0;height:44px;color:var(--txt3);transition:color .2s}
.engine-btn #engineIcon{display:flex;align-items:center;justify-content:center;width:24px;height:24px}
.engine-btn:hover{color:var(--txt2)}
.engine-dropdown{position:absolute;top:calc(100%+6px);left:0;z-index:50;background:#1c1c1e;border:1px solid var(--line);border-radius:14px;padding:4px;min-width:180px;box-shadow:var(--shadow2);display:none;animation:fadeIn 120ms ease}
[data-theme="light"] .engine-dropdown{background:#fff}.engine-dropdown.show{display:block}
.engine-dropdown .eng-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;font-size:14px;color:var(--txt2);transition:all .1s ease}
.engine-dropdown .eng-opt:hover{background:var(--fill);color:var(--txt)}
.search-wrap input{width:100%;padding:12px 0;border:none;font-size:16px;outline:none;background:transparent;color:var(--txt);font-family:var(--font);-webkit-appearance:none;letter-spacing:-.022em}
.search-wrap input::placeholder{color:var(--txt3)}
@media(max-width:768px){.search-wrap{max-width:100%;margin-bottom:32px}.engine-btn{height:46px}}

.main-area{max-width:960px;margin:0 auto;padding:0 0 48px}
@media(max-width:768px){.main-area{padding:0}}
.group-section{margin-bottom:48px}
.group-header{display:flex;align-items:baseline;gap:8px;margin-bottom:18px;padding:0 4px}
.group-header .name{font-size:13px;font-weight:550;color:var(--txt2);letter-spacing:-.01em}
.group-header .count{font-size:10px;font-family:var(--font-mono);color:var(--txt3)}
.group-header .actions{display:flex;gap:4px}
.group-header .actions button{width:24px;height:24px;border-radius:6px;border:1px solid var(--line);background:var(--fill);color:var(--txt3);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s ease}
.group-header .actions button:hover{border-color:var(--line2);color:var(--txt);background:var(--fill2)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
@media(max-width:768px){.cards{grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:10px}}
.card{display:flex;flex-direction:column;align-items:center;gap:14px;padding:22px 14px 18px;border-radius:16px;cursor:pointer;position:relative;transition:all .3s cubic-bezier(.2,.1,.2,1);animation:cardIn 400ms ease backwards}
.card::before{content:'';position:absolute;inset:0;border-radius:inherit;background:var(--fill);border:1px solid var(--line);opacity:var(--card-opacity,1);transition:all .3s cubic-bezier(.2,.1,.2,1);z-index:0}
.card::after{content:'';position:absolute;inset:0;border-radius:inherit;background:var(--card-tint,transparent);opacity:var(--card-opacity,1);transition:all .3s cubic-bezier(.2,.1,.2,1);z-index:1;pointer-events:none}
.card:hover::before{background:var(--fill2);border-color:var(--line2);transform:translateY(-1px)}
.card:hover::after{background:var(--card-tint-hover,transparent)}
.card>*{position:relative;z-index:2}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.card:active{transform:scale(.985)}
.card.dragging{opacity:.25;transform:scale(.95)}.card.drag-over{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue2)}
.card .icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s ease}
.card:hover .icon{transform:scale(1.06);filter:brightness(1.15)}
.card .icon svg{width:38px;height:38px;stroke:currentColor;fill:none;stroke-width:1.3;stroke-linecap:round;stroke-linejoin:round}
.card .icon img{width:48px;height:48px;border-radius:8px;object-fit:cover}
.card .name{font-size:13px;font-weight:500;text-align:center;line-height:1.3;word-break:break-word;color:var(--txt)}
.card .desc{font-size:10px;font-family:var(--font-mono);color:var(--txt3);text-align:center;margin-top:-8px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .card-edit,.card .card-del{position:absolute;top:8px;width:24px;height:24px;border-radius:6px;border:1px solid var(--line);background:#1c1c1e;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s ease;z-index:5;font-size:11px;backdrop-filter:blur(10px)}
[data-theme="light"] .card .card-edit,[data-theme="light"] .card .card-del{background:#fff}
.card .card-edit{right:36px;color:var(--txt3)}.card .card-del{right:7px;color:var(--txt3)}
.card .card-edit:hover{border-color:var(--line2);color:var(--txt)}.card .card-del:hover{border-color:rgba(255,69,58,.2);color:#ff453a}
@media(hover:hover){.card .card-edit,.card .card-del{opacity:0}.card:hover .card-edit,.card:hover .card-del{opacity:1}}
@media(max-width:768px){.card{padding:16px 8px 12px;gap:8px;border-radius:14px;min-height:104px;justify-content:center}.card .icon{width:44px;height:44px;border-radius:10px}.card .icon svg{width:26px;height:26px}.card .icon img{width:36px;height:36px}.card .name{font-size:12px;letter-spacing:0;line-height:1.2}.card .desc{display:none}.card .card-edit,.card .card-del{opacity:.25;width:20px;height:20px}.card .card-edit{right:28px}.card .card-del{right:4px}.cards{grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:10px}.group-section{margin-bottom:36px}}

.add-card{border:1px dashed var(--line2);border-radius:16px;padding:22px 14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;transition:all .2s ease;color:var(--txt3);min-height:100%;background:transparent}
.add-card:hover{border-color:var(--txt3);color:var(--txt2);background:var(--fill)}
.add-card .add-icon{font-size:22px;font-weight:200;opacity:.5}.add-card .add-label{font-size:11px}
@media(max-width:768px){.add-card{padding:16px 8px;border-radius:14px;min-height:104px}.add-card .add-icon{font-size:18px}.add-card .add-label{font-size:10px}}
.empty-state{grid-column:1/-1;text-align:center;padding:48px 24px;color:var(--txt3);font-size:13px}
.empty-state svg{width:40px;height:40px;opacity:.15;margin-bottom:12px}

.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn 150ms ease}
.modal{background:#1c1c1e;border-radius:20px;width:100%;max-width:420px;padding:28px 26px 24px;box-shadow:var(--shadow2);animation:slideUp 200ms cubic-bezier(.2,.1,.2,1);border:1px solid var(--line)}
[data-theme="light"] .modal{background:#fff}
.modal h3{font-size:16px;font-weight:590;margin-bottom:20px;letter-spacing:-.02em}
.modal .field{margin-bottom:16px}
.modal .field label{display:block;font-size:10px;color:var(--txt3);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;font-family:var(--font-mono)}
.modal .field input{width:100%;padding:9px 12px;border-radius:10px;border:1px solid var(--line);background:var(--fill);color:var(--txt);font-size:14px;outline:none;transition:border .15s ease;font-family:var(--font)}
.modal .field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue2)}
.modal .btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:24px}
.modal .btn-row button{padding:9px 20px;border-radius:10px;border:1px solid var(--line);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s ease;font-family:var(--font)}
.btn-cancel{background:var(--fill);color:var(--txt)}.btn-cancel:hover{background:var(--fill2)}
.btn-save{background:var(--txt);color:var(--bg);border-color:var(--txt)}.btn-save:hover{opacity:.88}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:300;background:#1c1c1e;color:var(--txt);padding:10px 22px;border-radius:12px;font-size:13px;border:1px solid var(--line);box-shadow:var(--shadow);animation:slideUp 180ms cubic-bezier(.2,.1,.2,1);backdrop-filter:blur(24px)}
[data-theme="light"] .toast{background:#fff}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
</style>
</head>
<body data-theme="light">
<div id="bgImage"></div>
<div id="bgOverlay"></div>
<div class="ambient"></div>
<div class="app">
  <div class="top-bar">
    <div class="top-left"><div class="cat-list" id="catBar"></div></div>
    <div class="settings-wrap">
      <button class="settings-btn" id="settingsBtn"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 0 0-16 0"/></svg></button>
      <div class="settings-card" id="settingsCard"></div>
    </div>
  </div>
  <div class="search-wrap" id="searchWrap">
    <div class="search-box">
      <div class="engine-btn" id="engineBtn"><span id="engineIcon">B</span></div>
      <input type="search" id="search" placeholder="搜索或输入网址" autocomplete="off" enterkeyhint="go">
    </div>
    <div class="engine-dropdown" id="engineDropdown"></div>
  </div>
  <main class="main-area" id="mainArea"><div id="contentArea"></div></main>
</div>
<script>
(function(){'use strict';
var H='192.168.1.21',KEY='dash_v22';
var DEFGROUPS=[];
function defP(){return{theme:'light',bg:'',bgEnabled:false,engine:'baidu',engines:JSON.parse(JSON.stringify(DEFENG)),groups:JSON.parse(JSON.stringify(DEFGROUPS)),activeGroup:'all',cardOpacity:100,cardColor:'#0a84ff',customTheme:'midnight',editMode:false};}
var DATA;
var editMode;function save(){localStorage.setItem(KEY,JSON.stringify(DATA));}
function P(){return DATA.profiles[DATA.current];}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}
function el(t,a){var e=document.createElement(t);if(a)for(var k in a){var v=a[k];if(k==='c')e.className=v;else if(k==='t')e.textContent=v;else if(k==='h')e.innerHTML=v;else if(k==='s')for(var sk in v)e.style[sk]=v[sk];else if(k==='on')for(var ok in v)e.addEventListener(ok,v[ok]);else if(k==='ds')for(var dk in v)e.dataset[dk]=v[dk];else e.setAttribute(k,v);}return e;}
